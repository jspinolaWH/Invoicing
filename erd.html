<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Invoicing System — ERD</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; font-family: 'Courier New', monospace; overflow: hidden; }
    #controls {
      position: fixed; top: 12px; left: 12px; z-index: 100;
      display: flex; gap: 8px; align-items: center;
    }
    .btn {
      background: #1e293b; color: #94a3b8; border: 1px solid #334155;
      border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 12px;
      font-family: 'Courier New', monospace;
    }
    .btn:hover { background: #334155; color: #e2e8f0; }
    #hint { color: #475569; font-size: 11px; }
    #legend {
      position: fixed; top: 12px; right: 12px; z-index: 100;
      background: #1e293b; border: 1px solid #334155; border-radius: 8px;
      padding: 14px; color: #94a3b8; font-size: 11px; min-width: 210px;
    }
    #legend h3 { color: #e2e8f0; margin-bottom: 10px; font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .legend-dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }
    #field-key {
      position: fixed; bottom: 12px; left: 12px; z-index: 100;
      background: #1e293b; border: 1px solid #334155; border-radius: 8px;
      padding: 10px 14px; font-size: 11px; color: #94a3b8; display: flex; gap: 16px;
    }
    .fk-badge { display: inline-flex; align-items: center; gap: 6px; }
    .fk-badge span { font-weight: bold; font-size: 10px; }
    .pk-color { color: #fbbf24; }
    .fk-color { color: #60a5fa; }
    .norm-color { color: #64748b; }
    #canvas-wrapper { width: 100vw; height: 100vh; overflow: hidden; cursor: grab; }
    #canvas-wrapper.dragging { cursor: grabbing; }
    svg#erd { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>

<div id="controls">
  <span id="hint">Scroll to zoom · Drag to pan · Click entity to highlight relations</span>
  <button class="btn" onclick="resetView()">Reset View</button>
</div>

<div id="legend">
  <h3>Domains</h3>
</div>

<div id="field-key">
  <div class="fk-badge"><span class="pk-color">PK</span><span>Primary Key</span></div>
  <div class="fk-badge"><span class="fk-color">FK</span><span>Foreign Key</span></div>
  <div class="fk-badge"><span class="norm-color">··</span><span>Column</span></div>
</div>

<div id="canvas-wrapper">
  <svg id="erd" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
        <path d="M0,0 L0,7 L7,3.5 z" fill="#475569"/>
      </marker>
      <marker id="arr-hi" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
        <path d="M0,0 L0,7 L7,3.5 z" fill="#f59e0b"/>
      </marker>
      <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
      </filter>
    </defs>
    <g id="viewport">
      <g id="relations-layer"></g>
      <g id="entities-layer"></g>
    </g>
  </svg>
</div>

// ──────────────────────────────────────────────────────────────
// Layout constants
const CW = 245;
const FH = 20;
const HH = 32;
const PAD = 8;

function entityHeight(e) { return HH + PAD + e.fields.length * FH + PAD; }

function bounds(e) {
  const h = entityHeight(e);
  return { x:e.x, y:e.y, w:CW, h, cx:e.x+CW/2, cy:e.y+h/2, r:e.x+CW, b:e.y+h };
}

function edgePoint(e, tx, ty) {
  const b = bounds(e);
  const dx = tx - b.cx, dy = ty - b.cy;
  if (dx === 0 && dy === 0) return { x: b.cx, y: b.y };
  const hw = b.w / 2, hh = b.h / 2;
  if (Math.abs(dx) * hh >= Math.abs(dy) * hw) {
    const t = hw / Math.abs(dx);
    return { x: b.cx + dx * t, y: b.cy + dy * t };
  } else {
    const t = hh / Math.abs(dy);
    return { x: b.cx + dx * t, y: b.cy + dy * t };
  }
}

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function svgText(txt, attrs) {
  const el = svgEl('text', attrs);
  el.textContent = txt;
  return el;
}

function trunc(s, n) { return s.length > n ? s.slice(0, n-1) + '…' : s; }

// ──────────────────────────────────────────────────────────────
function render() {
  const eLayer = document.getElementById('entities-layer');
  const rLayer = document.getElementById('relations-layer');
  const entityMap = Object.fromEntries(ENTITIES.map(e => [e.id, e]));

  // Relations
  RELATIONSHIPS.forEach(rel => {
    const fe = entityMap[rel.from], te = entityMap[rel.to];
    if (!fe || !te) return;
    const fb = bounds(fe), tb = bounds(te);
    const isSelf = rel.from === rel.to;
    let d;
    if (isSelf) {
      // Self-referential: draw a loop above the entity
      const lx = fb.cx, ty2 = fb.y - 50;
      d = `M${fb.cx-30},${fb.y} C${fb.cx-70},${fb.y-80} ${fb.cx+70},${fb.y-80} ${fb.cx+30},${fb.y}`;
    } else {
      const fp = edgePoint(fe, tb.cx, tb.cy);
      const tp = edgePoint(te, fb.cx, fb.cy);
      const dx = tp.x - fp.x, dy = tp.y - fp.y;
      const cx1 = fp.x + dx*0.35, cy1 = fp.y + dy*0.05;
      const cx2 = tp.x - dx*0.35, cy2 = tp.y - dy*0.05;
      d = `M${fp.x},${fp.y} C${cx1},${cy1} ${cx2},${cy2} ${tp.x},${tp.y}`;
    }

    const g = svgEl('g', { class:'relation', 'data-from':rel.from, 'data-to':rel.to });
    const path = svgEl('path', {
      d, stroke:'#334155', 'stroke-width':'1.5', fill:'none',
      'marker-end':'url(#arr)'
    });
    g.appendChild(path);

    if (rel.label) {
      const fb2 = bounds(fe), tb2 = bounds(te);
      const mx = isSelf ? fb2.cx : (fb2.cx + tb2.cx) / 2;
      const my = isSelf ? fb2.y - 55 : (fb2.cy + tb2.cy) / 2;
      const bg = svgEl('rect', { x:mx-16, y:my-9, width:32, height:12, rx:3, fill:'#0f172a' });
      const txt = svgText(rel.label, {
        x:mx, y:my, 'text-anchor':'middle', 'font-size':'9',
        fill:'#64748b', 'font-family':'Courier New, monospace'
      });
      g.appendChild(bg);
      g.appendChild(txt);
    }
    rLayer.appendChild(g);
  });

  // Entities
  ENTITIES.forEach(entity => {
    const col = DOMAINS[entity.domain].color;
    const h = entityHeight(entity);
    const g = svgEl('g', { class:'entity-card', id:`ent-${entity.id}`,
      transform:`translate(${entity.x},${entity.y})`, style:'cursor:pointer' });

    // Shadow / card bg
    g.appendChild(svgEl('rect', { width:CW, height:h, rx:7, fill:'#1a2235', stroke:col,
      'stroke-width':'1.5', filter:'url(#shadow)' }));

    // Header
    g.appendChild(svgEl('rect', { width:CW, height:HH, rx:7, fill:col, opacity:'0.92' }));
    g.appendChild(svgEl('rect', { width:CW, height:10, y:HH-10, fill:col, opacity:'0.92' }));

    // Entity name
    g.appendChild(svgText(entity.id, {
      x:CW/2, y:HH/2+5, 'text-anchor':'middle', 'font-size':'12', 'font-weight':'bold',
      fill:'#ffffff', 'font-family':'Courier New, monospace'
    }));

    // Separator
    g.appendChild(svgEl('line', { x1:0, y1:HH, x2:CW, y2:HH, stroke:col,
      'stroke-width':'0.5', opacity:'0.4' }));

    // Fields
    entity.fields.forEach((f, i) => {
      const fy = HH + PAD + i * FH + FH - 5;
      let fc = '#64748b', badge = '··';
      if (f.pk)  { fc = '#fbbf24'; badge = 'PK'; }
      if (f.fk)  { fc = '#60a5fa'; badge = 'FK'; }

      g.appendChild(svgText(badge, {
        x:8, y:fy, 'font-size':'9', 'font-weight':'bold', fill:fc,
        'font-family':'Courier New, monospace'
      }));
      g.appendChild(svgText(trunc(f.name, 24), {
        x:30, y:fy, 'font-size':'11', fill:fc,
        'font-family':'Courier New, monospace'
      }));
      g.appendChild(svgText(trunc(f.type, 17), {
        x:CW-6, y:fy, 'text-anchor':'end', 'font-size':'10', fill:'#3d5068',
        'font-family':'Courier New, monospace'
      }));
    });

    eLayer.appendChild(g);
  });
}

// ──────────────────────────────────────────────────────────────
// Pan / Zoom
let scale = 0.42, tx = 60, ty = 60;
let drag = false, dsx, dsy, dtx, dty;

function applyTx() {
  document.getElementById('viewport').setAttribute('transform',
    `translate(${tx},${ty}) scale(${scale})`);
}

function resetView() {
  scale = 0.42; tx = 60; ty = 60; applyTx();
}

const wrap = document.getElementById('canvas-wrapper');

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY > 0 ? 0.88 : 1.14;
  const r = wrap.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  tx = mx - f * (mx - tx);
  ty = my - f * (my - ty);
  scale = Math.max(0.08, Math.min(4, scale * f));
  applyTx();
}, { passive: false });

wrap.addEventListener('mousedown', e => {
  drag=true; dsx=e.clientX; dsy=e.clientY; dtx=tx; dty=ty;
  wrap.classList.add('dragging');
});
wrap.addEventListener('mousemove', e => {
  if (!drag) return;
  tx = dtx + (e.clientX-dsx); ty = dty + (e.clientY-dsy); applyTx();
});
['mouseup','mouseleave'].forEach(ev => wrap.addEventListener(ev, () => {
  drag=false; wrap.classList.remove('dragging');
}));

// ──────────────────────────────────────────────────────────────
// Click to highlight
let selected = null;

document.getElementById('entities-layer').addEventListener('click', e => {
  const card = e.target.closest('.entity-card');
  const id = card ? card.id.replace('ent-','') : null;
  if (id === selected) { clearHL(); return; }
  if (id) highlight(id); else clearHL();
});

function highlight(id) {
  selected = id;
  document.querySelectorAll('.relation path').forEach(p => {
    p.setAttribute('stroke', '#1e3355');
    p.setAttribute('marker-end', 'url(#arr)');
  });
  document.querySelectorAll(`.relation[data-from="${id}"] path,
    .relation[data-to="${id}"] path`).forEach(p => {
    p.setAttribute('stroke', '#f59e0b');
    p.setAttribute('stroke-width', '2');
    p.setAttribute('marker-end', 'url(#arr-hi)');
  });
}

function clearHL() {
  selected = null;
  document.querySelectorAll('.relation path').forEach(p => {
    p.setAttribute('stroke', '#334155');
    p.setAttribute('stroke-width', '1.5');
    p.setAttribute('marker-end', 'url(#arr)');
  });
}

// ──────────────────────────────────────────────────────────────
// Legend
function buildLegend() {
  const leg = document.getElementById('legend');
  for (const [, d] of Object.entries(DOMAINS)) {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML = `<div class="legend-dot" style="background:${d.color}"></div><span>${d.label}</span>`;
    leg.appendChild(div);
  }
}

// ──────────────────────────────────────────────────────────────
render();
buildLegend();
resetView();
</script>
